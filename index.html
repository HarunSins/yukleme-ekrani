<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0; padding: 0;
            background: url('arka-plan.jpg') no-repeat center center fixed; 
            background-size: cover;
            font-family: 'Arial', sans-serif;
            overflow: hidden; color: white;
        }
        .container {
            position: absolute; bottom: 10%; width: 100%; text-align: center;
        }
        /* Yükleme Çubuğu Tasarımı */
        .progress-box {
            width: 50%; background: rgba(0,0,0,0.5);
            border: 2px solid #fff; margin: 0 auto; height: 30px; border-radius: 15px;
        }
        #progress-bar {
            width: 0%; height: 100%; background: #3498db; /* Çubuk rengi */
            border-radius: 12px; transition: width 0.2s;
        }
        #status { margin-top: 10px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress-box"><div id="progress-bar"></div></div>
        <div id="status">Sunucuya bağlanılıyor...</div>
    </div>

    <script type="text/javascript">
        // GMOD'dan gelen verileri yakalayan fonksiyonlar
        function SetFilesNeeded(needed) { totalFiles = needed; }
        function SetFilesRemaining(remaining) {
            let progress = ((totalFiles - remaining) / totalFiles) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
        }
        function SetStatusChanged(status) {
            document.getElementById('status').innerHTML = status;
        }
    </script>
</body>
</html>
