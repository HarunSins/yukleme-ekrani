<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0; padding: 0;
            background: #000 url('arka-plan.jpg') no-repeat center center fixed; 
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 60%;
            text-align: center;
            background: rgba(0, 0, 0, 0.7); /* Yazı ve barın okunması için hafif şeffaf arka plan */
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #ff0000; /* Temaya uygun kırmızı çerçeve */
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            margin-top: 200px; /* Logo üstte kalsın diye biraz aşağı kaydırdık */
        }
        /* Yükleme Çubuğu Tasarımı */
        .progress-box {
            width: 100%; 
            background: #222;
            border: 1px solid #444; 
            height: 25px; 
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        #progress-bar {
            width: 0%; 
            height: 100%; 
            background: linear-gradient(90deg, #800000, #ff0000); /* Kırmızı geçişli bar */
            box-shadow: 0 0 10px #ff0000;
            transition: width 0.3s ease;
        }
        #status { 
            font-size: 18px; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff0000;
            text-shadow: 2px 2px 4px #000; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="status">DOSYALAR DOĞRULANIYOR...</div>
        <div class="progress-box"><div id="progress-bar"></div></div>
        <div style="font-size: 12px; color: #aaa;">FAVELA CITY ROLEPLAY - HOŞ GELDİNİZ</div>
    </div>

    <script type="text/javascript">
        var totalFiles = 100;
        function SetFilesNeeded(needed) { totalFiles = needed; }
        function SetFilesRemaining(remaining) {
            var progress = ((totalFiles - remaining) / totalFiles) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
        }
        function SetStatusChanged(status) {
            document.getElementById('status').innerHTML = status;
        }
    </script>
</body>
</html>
