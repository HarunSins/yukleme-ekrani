<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0; padding: 0;
            background: #000 url('favela-yukleme-arkaplan.png') no-repeat center center fixed; 
            background-size: cover;
            /* İstediğin o şık ve ince font */
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden; color: white;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.5) 100%);
            z-index: 1;
        }

        .main-container {
            position: relative; z-index: 2; text-align: center;
            margin-top: 180px; /* Logonun altına gelmesi için */
        }

        /* Bloom Efektli Parlayan Yazı */
        #status {
            font-size: 28px; 
            font-weight: 200; /* İnce ve elit görünüm */
            letter-spacing: 8px; 
            color: #ff0000;
            text-transform: uppercase;
            /* Kırmızı Bloom (Parlama) Efekti */
            text-shadow: 0 0 10px #ff0000, 0 0 20px #800000, 0 0 30px #000;
            animation: pulse 2s infinite ease-in-out;
        }

        /* Alttaki küçük bilgilendirme yazısı */
        #sub-text {
            margin-top: 10px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Hafif nefes alma animasyonu (Parlama için) */
        @keyframes pulse {
            0% { opacity: 0.8; text-shadow: 0 0 10px #ff0000; }
            50% { opacity: 1; text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000; }
            100% { opacity: 0.8; text-shadow: 0 0 10px #ff0000; }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    
    <div class="main-container">
        <!-- Parlayan Ana Yazı -->
        <div id="status">SUNUCUYA BAĞLANILIYOR</div>
        <!-- Alttaki Sabit Yazı -->
        <div id="sub-text">FAVELA-CITY</div>
    </div>

    <script type="text/javascript">
        var dots = 0;
        var baseText = "SUNUCUYA BAĞLANILIYOR";

        // Noktaların loopta dönmesi için (Bağlanılıyor., .., ...)
        setInterval(function() {
            dots++;
            if (dots > 3) dots = 0;
            document.getElementById('status').innerHTML = baseText + ".".repeat(dots);
        }, 600);

        // GMOD'dan gelen teknik yazıları (Lua started vs.) 
        // ana parlayan yazının altında küçükçe göstermek istersen:
        function SetStatusChanged(status) {
            // Eğer istersen teknik detaylar sub-text kısmında akabilir
            // document.getElementById('sub-text').innerHTML = status;
        }
    </script>
</body>
</html>
