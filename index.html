<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden; color: white;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
            background-color: #000; 
        }

        /* Arka Plan Katmanları */
        .bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center center;
        }

        /* 1. Katman: Sabit PNG (En altta durur) */
        #bg-static {
            background-image: url('favela-city-yuklemeekrani.png');
            z-index: -2; 
        }

        /* 2. Katman: Oynayan GIF (Resmin üstüne biner) */
        #bg-gif {
            /* URL'yi JS ile vereceğimiz için burayı boş bırakıyoruz */
            z-index: -1; 
            opacity: 0; /* Başlangıçta görünmez */
            transition: opacity 1s ease-in-out; /* 1 saniyelik yumuşak geçiş */
        }

        /* Karartma Paneli */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 100%);
            z-index: 1;
        }

        .main-container {
            position: relative; z-index: 2; text-align: center;
            margin-top: 180px; 
        }

        /* Bloom Efektli Parlayan Yazı */
        #status {
            font-size: 28px; 
            font-weight: 200; 
            letter-spacing: 8px; 
            color: #ff0000;
            text-transform: uppercase;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #800000, 0 0 30px #000;
            animation: pulse 2s infinite ease-in-out;
        }

        #sub-text {
            margin-top: 10px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        @keyframes pulse {
            0% { opacity: 0.8; text-shadow: 0 0 10px #ff0000; }
            50% { opacity: 1; text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000; }
            100% { opacity: 0.8; text-shadow: 0 0 10px #ff0000; }
        }
    </style>
</head>
<body>
    <div id="bg-static" class="bg-layer"></div>
    <div id="bg-gif" class="bg-layer"></div>

    <div class="overlay"></div>
    
    <div class="main-container">
        <div id="status">SUNUCUYA BAĞLANILIYOR</div>
        <div id="sub-text">FAVELA-CITY</div>
    </div>

    <script type="text/javascript">
        var dots = 0;
        var baseText = "SUNUCUYA BAĞLANILIYOR";

        setInterval(function() {
            dots++;
            if (dots > 3) dots = 0;
            document.getElementById('status').innerHTML = baseText + ".".repeat(dots);
        }, 600);

        function SetStatusChanged(status) {}

        // --- KUSURSUZ GİF VE RESİM GEÇİŞ SİSTEMİ ---
        
        var resimSuresi = 3000; // Sabit PNG 3 saniye kalsın
        var gifSuresi = 10520;  // GIF 10.52 saniye
        var gecisSuresi = 1000; // Kararma efekti 1 saniye
        
        var bgGif = document.getElementById('bg-gif');

        function gifDongusu() {
            // HATA ÇÖZÜMÜ 1: GIF'i her seferinde zorla en baştan başlatmak için sonuna rastgele sayı ekliyoruz.
            // Bu sayede tarayıcı GIF'i arka planda sarmak yerine hep sıfırdan oynatır.
            var sifirla = new Date().getTime();
            bgGif.style.backgroundImage = "url('favela-city-gif.gif?t=" + sifirla + "')";

            // GIF'i yumuşakça ekrana getir
            bgGif.style.opacity = "1";

            // HATA ÇÖZÜMÜ 2: GIF'in bitmesine tam 1 saniye kala kararmayı başlat (10.52 - 1 = 9.52 saniye)
            // Bu sayede GIF tam bittiğinde ekrandan silinmiş olur ve o "tak" diye atma yaşanmaz.
            var fadeOutZamani = gifSuresi - gecisSuresi; 

            setTimeout(function() {
                bgGif.style.opacity = "0"; // 9.52. saniyede yavaşça silinmeye başla
                
                // Kararma tamamen bittikten sonra (1 saniye) bekle
                setTimeout(function() {
                    
                    // Artık alttaki PNG görünüyor. PNG'nin süresi (3 saniye) kadar bekle
                    setTimeout(function() {
                        gifDongusu(); // Sistemi baştan kusursuzca tekrar başlat
                    }, resimSuresi);

                }, gecisSuresi);

            }, fadeOutZamani);
        }

        // Sayfa yüklendiğinde önce 3 saniye PNG'yi göster, sonra döngüyü ateşle
        setTimeout(function() {
            gifDongusu();
        }, resimSuresi);
    </script>
</body>
</html>
