<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0; padding: 0;
            background: #000 url('favela-yukleme-arkaplan.png') no-repeat center center fixed; 
            background-size: cover;
            /* Fontu senin istediğin o ince/şık tarza çektim */
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden; color: white;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }

        .main-container {
            width: 80%;
            max-width: 900px;
            text-align: center;
            /* Barı logonun tam altına hizalamak için aşağı kaydırdık */
            margin-top: 200px; 
        }

        /* Barın üstündeki dosya durum yazısı */
        #file-status {
            font-size: 13px; 
            color: #ffffff; 
            text-transform: uppercase;
            margin-bottom: 10px; 
            letter-spacing: 2px;
            text-shadow: 1px 1px 3px #000;
        }

        /* İstediğin o uzun ve parlayan bar tasarımı */
        .progress-wrapper {
            width: 100%; 
            height: 12px; 
            background: rgba(0,0,0,0.8);
            border-radius: 10px; 
            border: 1px solid #333; 
            overflow: hidden;
        }

        #progress-inner {
            width: 0%; /* Başlangıç sıfır */
            height: 100%;
            background: linear-gradient(90deg, #800000, #ff0000);
            box-shadow: 0 0 15px #ff0000;
            /* Akıcı dolma efekti */
            transition: width 0.4s ease-out; 
        }

        /* Alt taraftaki marka yazısı */
        #loading-text {
            margin-top: 15px; 
            font-size: 14px; 
            color: #fff; 
            letter-spacing: 4px;
            text-shadow: 1px 1px 4px #000;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Dosya durumu burada yazacak (Lua Started, Download vs.) -->
        <div id="file-status">SUNUCUYA BAĞLANILIYOR...</div>

        <!-- Uzun Bar -->
        <div class="progress-wrapper">
            <div id="progress-inner"></div>
        </div>
        
        <!-- Alt Metin -->
        <div id="loading-text">FAVELA-CITY ROLEPLAY</div>
    </div>

    <script type="text/javascript">
        // GMOD'da barın çalışması için EN GARANTİ YÖNTEM:
        var total = 0;
        var needed = 0;

        // GMOD dosyaları saymaya başladığında bu çalışır
        function SetFilesNeeded(val) {
            needed = val;
            total = val;
        }

        // Dosyalar indikçe bu çalışır
        function SetFilesRemaining(val) {
            if (total <= 0) return; // Toplam dosya gelmediyse işlem yapma

            var remaining = val;
            var progress = ((total - remaining) / total) * 100;
            
            // Barı güncelle
            document.getElementById('progress-inner').style.width = progress + '%';
        }

        // Yazıları günceller
        function SetStatusChanged(status) {
            document.getElementById('file-status').innerHTML = status;
        }

        // Alt metin nokta animasyonu (donma olmadığını göstermek için)
        var dots = 0;
        setInterval(function() {
            dots = (dots + 1) % 4;
            document.getElementById('loading-text').innerHTML = "FAVELA-CITY ROLEPLAY" + ".".repeat(dots);
        }, 600);
    </script>
</body>
</html>
