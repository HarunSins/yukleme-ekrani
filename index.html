<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0; padding: 0;
            background: #000 url('favela-yukleme-arkaplan.png') no-repeat center center fixed; 
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; color: white;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }

        .main-container {
            width: 500px; text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 25px; border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,0,0,0.2);
            margin-top: 100px;
        }

        /* Oyuncu Kısmı */
        .player-box {
            display: flex; align-items: center; justify-content: center; margin-bottom: 15px;
        }
        #avatar {
            width: 50px; height: 50px; border-radius: 50%;
            border: 2px solid #ff0000; box-shadow: 0 0 10px #ff0000;
            margin-right: 12px; background-color: #222;
        }
        .name-tag { text-align: left; line-height: 1.2; }
        #username { font-size: 20px; font-weight: bold; color: #ff0000; text-transform: uppercase; }

        /* Dosya Yükleme Yazısı (Barın Üstünde Küçük) */
        #file-status {
            font-size: 11px; color: #aaa; text-transform: uppercase;
            margin-bottom: 5px; letter-spacing: 1px; height: 14px;
        }

        /* Modern Parlayan Bar */
        .progress-wrapper {
            width: 100%; height: 12px; background: #111;
            border-radius: 10px; border: 1px solid #333; overflow: hidden;
            box-shadow: inset 0 0 5px #000;
        }
        #progress-inner {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #800000, #ff0000);
            box-shadow: 0 0 15px #ff0000;
            transition: width 0.2s ease-out;
        }

        /* Sabit Durum Yazısı (Barın Altında) */
        #loading-text {
            margin-top: 10px; font-size: 13px; font-weight: bold;
            color: #eee; letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Oyuncu Bilgisi -->
        <div class="player-box">
            <img id="avatar" src="https://steamcdn-a.akamaihd.net/steamcommunity/public/images/avatars/fe/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg">
            <div class="name-tag">
                <div style="font-size: 10px; color: #ccc;">HOŞ GELDİN,</div>
                <div id="username">YÜKLENİYOR...</div>
            </div>
        </div>

        <!-- Dosya Yazısı -->
        <div id="file-status">SUNUCU VERİLERİ OKUNUYOR</div>

        <!-- Bar -->
        <div class="progress-wrapper">
            <div id="progress-inner"></div>
        </div>
        
        <!-- Alt Sabit Yazı -->
        <div id="loading-text">SUNUCUYA BAĞLANILAMAYOR...</div>
    </div>

    <script type="text/javascript">
        var totalFiles = 0;
        var filesLeft = 0;

        // GMOD'un ana veri fonksiyonu (İsim ve Avatar için)
        function GameDetails( servername, serverurl, mapname, maxplayers, steamid, gamemode ) {
            // GMOD %s parametresinden steamid geldiğinde ismi çekmeyi dener
            // Not: Web ortamında gerçek ismi çekmek için Steam API gerekir ancak
            // GMOD bunu yerel olarak hallederse 'steamid' kısmını buraya yazar.
            document.getElementById('username').innerHTML = "OYUNCU"; 
        }

        // Dosya sayısı geldiğinde
        function SetFilesNeeded( needed ) {
            totalFiles = needed;
        }

        // Kalan dosya sayısı güncellendikçe barı doldur
        function SetFilesRemaining( remaining ) {
            filesLeft = remaining;
            var progress = ((totalFiles - filesLeft) / totalFiles) * 100;
            
            // Barı doldur
            if (progress > 0) {
                document.getElementById('progress-inner').style.width = progress + '%';
            }
        }

        // Lua/Dosya durumları değiştikçe barın üstündeki küçük yazıyı güncelle
        function SetStatusChanged( status ) {
            document.getElementById('file-status').innerHTML = status;
        }

        // Alt taraftaki "Bağlanılıyor..." yazısının loop animasyonu
        var dots = 0;
        setInterval(function() {
            dots = (dots + 1) % 4;
            var d = ".".repeat(dots);
            document.getElementById('loading-text').innerHTML = "SUNUCUYA BAĞLANILIYOR" + d;
        }, 500);
    </script>
</body>
</html>
